# Render.com Blueprint - one-click deploy for the Cardio AI Operations Platform.
# In Render: New + > Blueprint, point it at this repo. It creates BOTH the
# web service and a managed Postgres database, and wires DATABASE_URL for you.
# Then fill the secret env vars marked sync:false in the dashboard.

databases:
  - name: cardioai-db
    databaseName: cardioai_operations
    plan: free            # free Postgres; upgrade to "basic-256mb"+ for production

services:
  - type: web
    name: cardioai-operations
    runtime: node
    plan: starter          # "free" also works; starter ($7/mo) stays always-on
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_EMAIL_DOMAIN
        value: cardioailive.com
      - key: ALLOWED_EMAILS
        value: ""
      # DATABASE_URL is injected automatically from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: cardioai-db
          property: connectionString
      # Secrets - set these in the Render dashboard after first deploy.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SALES_ENGINE_URL
        sync: false
      - key: INTEGRATION_API_KEY
        sync: false
